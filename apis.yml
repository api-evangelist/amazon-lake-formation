name: Amazon Lake Formation
segments:
- Data Lakes
- Analytics
description: AWS Lake Formation is a service that makes it easy to set up a secure data lake in days, providing centralized governance and security for data stored in Amazon S3 and other AWS data 
  stores with fine-grained access control.
